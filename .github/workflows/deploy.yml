name: Deploy to OCI VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
            script: |
              set -e
              cd /home/ubuntu/vanguard-copilot
              git checkout master
              git pull origin master
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose up -d --build
            echo "Deploy complete. Checking container..."
            sleep 3
            docker ps --filter name=vanguard --format "{{.Names}} {{.Status}}"
            docker logs vanguard --tail 3
